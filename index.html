<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Set Home – Go Home</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    
    <!-- iOS support -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Set Home Go Home">
    <link rel="apple-touch-icon" href="icon-192.png">
    <style>
        :root {
            --red: #ff4d4d;
            --green: #4caf50;
            --blue: #2196f3;
            --white: #ffffff;
            --black: #000000;
            --gray: #f0f0f0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        a, button {
            user-select: auto;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--black);
            color: var(--white);
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .screen {
            display: none;
            width: 100%;
            height: 100%;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            text-align: center;
        }

        .screen.active {
            display: flex;
        }

        /* Home Screen */
        .donation-btn {
            text-decoration: none;
            color: var(--white);
            font-size: 1.1rem;
            background: rgba(255, 255, 255, 0.1);
            padding: 10px 20px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            z-index: 10;
            text-align: center;
            margin-bottom: 20px;
        }

        #install-btn {
            display: none;
            position: absolute;
            bottom: 30px;
            background: var(--blue);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: bold;
            z-index: 10;
        }

        .help-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            color: var(--white);
            border: 1px solid rgba(255, 255, 255, 0.2);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 10;
        }

        .lang-btn {
            position: absolute;
            top: 20px;
            right: 70px;
            background: rgba(255, 255, 255, 0.1);
            color: var(--white);
            border: 1px solid rgba(255, 255, 255, 0.2);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 10;
        }

        /* Language Modal */
        #lang-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 150;
            padding: 20px;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .lang-content {
            background: #1a1a1a;
            padding: 25px;
            border-radius: 20px;
            border: 2px solid var(--blue);
            max-width: 95%;
            width: 300px;
            max-height: 80vh;
            display: flex;
            flex-direction: column;
        }

        .lang-list {
            overflow-y: auto;
            margin-top: 15px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .lang-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px 10px;
            border-radius: 10px;
            text-align: center;
            cursor: pointer;
            border: 1px solid transparent;
            font-size: 0.9rem;
        }

        .lang-item.active {
            background: var(--blue);
            border-color: var(--white);
        }

        .poi-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.1);
            color: var(--white);
            border: 1px solid rgba(255, 255, 255, 0.2);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 10;
        }

        /* POI Modal */
        #poi-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 150;
            padding: 20px;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .poi-content {
            background: #1a1a1a;
            padding: 25px;
            border-radius: 20px;
            border: 2px solid var(--green);
            max-width: 95%;
            width: 400px;
            max-height: 80vh;
            display: flex;
            flex-direction: column;
        }

        .poi-list {
            overflow-y: auto;
            margin-top: 15px;
            flex: 1;
        }

        .poi-item {
            background: rgba(255, 255, 255, 0.05);
            margin-bottom: 10px;
            padding: 15px;
            border-radius: 10px;
            text-align: left;
            cursor: pointer;
            border: 1px solid transparent;
        }

        .poi-item:active {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--green);
        }

        .poi-item h4 {
            margin-bottom: 5px;
            color: var(--green);
        }

        .poi-item p {
            font-size: 0.9rem;
            opacity: 0.7;
        }

        .loading-poi {
            padding: 20px;
            font-style: italic;
            opacity: 0.7;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        /* POI Categories */
        .poi-categories {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-bottom: 15px;
        }

        .cat-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 8px 4px;
            border-radius: 8px;
            font-size: 0.7rem;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .cat-btn.active {
            background: var(--green);
            border-color: var(--green);
        }

        .cat-icon {
            font-size: 1.2rem;
        }

        /* Loading Spinner */
        .spinner {
            width: 50px;
            height: 50px;
            border: 6px solid rgba(255, 255, 255, 0.1);
            border-left-color: var(--green);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: inline-block;
            box-shadow: 0 0 10px rgba(76, 175, 80, 0.5);
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Modal / Help Overlay */
        #help-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 100;
            padding: 30px;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .help-content {
            background: #1a1a1a;
            padding: 30px;
            border-radius: 20px;
            border: 2px solid var(--blue);
            max-width: 90%;
            text-align: left;
        }

        .help-content h2 {
            margin-bottom: 20px;
            color: var(--blue);
        }

        .help-content p {
            margin-bottom: 15px;
            line-height: 1.4;
        }

        .close-help {
            margin-top: 20px;
            background: var(--blue);
            color: white;
            border: none;
            padding: 10px 30px;
            border-radius: 10px;
            font-weight: bold;
        }

        /* Custom Confirmation Modal */
        #confirm-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 200;
            padding: 30px;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .confirm-content {
            background: #1a1a1a;
            padding: 30px;
            border-radius: 20px;
            border: 2px solid var(--red);
            max-width: 90%;
            text-align: center;
        }

        .confirm-content h2 {
            margin-bottom: 20px;
            color: var(--white);
            font-size: 1.5rem;
        }

        .confirm-content p {
            margin-bottom: 25px;
            line-height: 1.4;
            font-size: 1.2rem;
        }

        .confirm-btns {
            display: flex;
            gap: 20px;
            justify-content: center;
        }

        .confirm-btn {
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            flex: 1;
        }

        .confirm-yes {
            background: var(--red);
            color: white;
        }

        .confirm-no {
            background: var(--gray);
            color: black;
        }

        .btn-container {
            display: flex;
            flex-direction: column;
            gap: 5vh;
            margin-top: 10vh;
            width: 90%;
            align-items: center;
        }

        .circle-btn {
            width: 38vh;
            height: 38vh;
            max-width: 75vw;
            max-height: 75vw;
            border-radius: 50%;
            border: none;
            color: var(--white);
            font-size: 2.5rem;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.1s, border 0.3s;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            aspect-ratio: 1/1;
        }

        .circle-btn:active {
            transform: scale(0.95);
        }

        #set-home-btn {
            background-color: var(--red);
            border: 12px solid transparent;
        }

        #set-home-btn.home-set {
            background-color: var(--green);
            border-color: transparent;
        }

        #go-home-btn {
            background-color: var(--blue);
            width: 30vh;
            height: 30vh;
            max-width: 60vw;
            max-height: 60vw;
            font-size: 2rem;
        }

        /* Compass Screen */
        .compass-container {
            position: relative;
            width: 45vh;
            height: 45vh;
            max-width: 85vw;
            max-height: 85vw;
            border-radius: 50%;
            border: 6px solid var(--white);
            margin-bottom: 5vh;
            display: flex;
            align-items: center;
            justify-content: center;
            aspect-ratio: 1/1;
        }

        .compass-marks {
            position: absolute;
            width: 100%;
            height: 100%;
            font-weight: bold;
            font-size: 2rem;
        }

        .mark {
            position: absolute;
            width: 40px;
            text-align: center;
        }

        .mark-n { top: 15px; left: 50%; transform: translateX(-50%); }
        .mark-e { right: 15px; top: 50%; transform: translateY(-50%); }
        .mark-s { bottom: 15px; left: 50%; transform: translateX(-50%); }
        .mark-w { left: 15px; top: 50%; transform: translateY(-50%); }

        .arrow {
            width: 0;
            height: 0;
            border-left: 4vh solid transparent;
            border-right: 4vh solid transparent;
            border-bottom: 12vh solid var(--white);
            max-border-left: 8vw;
            max-border-right: 8vw;
            max-border-bottom: 24vw;
            transition: transform 0.2s cubic-bezier(0.1, 0.7, 1.0, 0.1), color 0.3s;
        }

        .arrow.green {
            border-bottom-color: var(--green);
        }

        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0.3; }
            100% { opacity: 1; }
        }

        .blink {
            animation: blink 0.5s infinite;
        }

        .distance-display {
            font-size: 3.5rem;
            font-weight: bold;
            margin-bottom: 6vh;
        }

        .stop-btn {
            background: var(--red);
            color: white;
            border: none;
            padding: 2.5vh 8vh;
            border-radius: 15px;
            font-size: 2rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        /* Trip Complete Screen */
        .complete-title {
            font-size: 4rem;
            margin-bottom: 4vh;
        }

        .stats {
            font-size: 2.5rem;
            margin-bottom: 8vh;
        }

        .reset-btn {
            background: var(--blue);
            color: white;
            border: none;
            padding: 3vh 10vh;
            border-radius: 20px;
            font-size: 2rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
    </style>
</head>

                startNew: "开始新旅程",
                install: "📱 安装应用",
                coffee: "喜欢这个应用吗？<br>☕ 请我喝杯咖啡<br>@Master8383",
                helpTitle: "使用说明",
                helpSteps: [
                    "<strong>1. 设置起点：</strong> 在你的车、帐篷或某棵树旁点击此按钮（你肯定会忘在那儿）。",
                    "<strong>2. 随意漫步：</strong> 去远足、去迷路、去追松鼠。我们不会评价。",
                    "<strong>3. 回家：</strong> 累了或饿了时点击此按钮。像命悬一线一样跟着箭头走（可能真是这样）。",
                    "<strong>4. 绿色箭头：</strong> 你的方向正确。继续加油，英雄！",
                    "<strong>5. 到达：</strong> 当手机震动并撒出彩纸时，你到了！该吃零食了。"
                ],
                close: "关闭",
                gotIt: "知道了！",
                findPlaces: "查找地点",
                locatingYou: "正在定位...",
                searchingPoi: "正在搜索附近地点...",
                noPoiFound: "3公里内未找到地点。",
                gpsError: "GPS错误",
                connError: "连接错误",
                targetSet: "目标设置为：",
                confirmStop1: "确定要停止吗？行程将被清除。",
                confirmStop2: "真的确定吗？你需要重新设置起点。",
                yes: "是",
                no: "否",
                ok: "确定",
                selectLang: "选择语言"
            }
        };

        const languages = [
            { code: 'en', name: 'English' },
            { code: 'nl', name: 'Nederlands' },
            { code: 'de', name: 'Deutsch' },
            { code: 'fr', name: 'Français' },
            { code: 'es', name: 'Español' },
            { code: 'it', name: 'Italiano' },
            { code: 'pl', name: 'Polski' },
            { code: 'pt', name: 'Português' },
            { code: 'tr', name: 'Türkçe' },
            { code: 'ru', name: 'Русский' },
            { code: 'ar', name: 'العربية' },
            { code: 'hi', name: 'हिन्दी' },
            { code: 'zh', name: '中文' }
        ];

        // UI Elements
        const homeScreen = document.getElementById('home-screen');
        const compassScreen = document.getElementById('compass-screen');
        const completeScreen = document.getElementById('trip-complete-screen');
        
        const setHomeBtn = document.getElementById('set-home-btn');
        const goHomeBtn = document.getElementById('go-home-btn');
        const stopBtn = document.getElementById('stop-btn');
        const startNewBtn = document.getElementById('start-new-btn');
        const installBtn = document.getElementById('install-btn');
        const openHelp = document.getElementById('open-help');
        const closeHelp = document.getElementById('close-help');
        const helpOverlay = document.getElementById('help-overlay');
        const helpTitle = document.getElementById('help-title');
        const helpSteps = document.getElementById('help-steps');
        const openPoiBtn = document.getElementById('open-poi');
        const closePoiBtn = document.getElementById('close-poi');
        const poiOverlay = document.getElementById('poi-overlay');
        const poiList = document.getElementById('poi-list');
        const poiTitle = document.getElementById('poi-title');
        const poiStatus = document.getElementById('poi-status');
        const catBtns = document.querySelectorAll('.cat-btn');
        const openLangBtn = document.getElementById('open-lang');
        const closeLangBtn = document.getElementById('close-lang');
        const langOverlay = document.getElementById('lang-overlay');
        const langList = document.getElementById('lang-list');
        const langModalTitle = document.getElementById('lang-modal-title');
        const confirmOverlay = document.getElementById('confirm-overlay');
        const confirmMsg = document.getElementById('confirm-msg');
        const confirmYesBtn = document.getElementById('confirm-yes-btn');
        const confirmNoBtn = document.getElementById('confirm-no-btn');
        const donationLink = document.getElementById('donation-link');
        const distLabel = document.getElementById('dist-label');
        const completeTitle = document.getElementById('complete-title');
        const timeLabel = document.getElementById('time-label');
        const minLabel = document.getElementById('min-label');
        
        const arrow = document.getElementById('arrow');
        const distanceVal = document.getElementById('distance-val');
        const etaDisplay = document.getElementById('eta-display');
        const tripTimeDisplay = document.getElementById('trip-time');

        // Language Management
        function setLanguage(langCode) {
            currentLang = langCode;
            localStorage.setItem('appLang', langCode);
            updateUI();
            renderLangList();
        }

        function updateUI() {
            const t = translations[currentLang];
            goHomeBtn.innerText = t.goHome;
            if (!homeLat) {
                setHomeBtn.innerText = t.setHome;
            } else {
                setHomeBtn.innerText = setHomeBtn.innerText.includes('POI') || setHomeBtn.innerText.includes(':') ? t.homeSetPoi : t.homeSet;
            }
            stopBtn.innerText = t.stop;
            startNewBtn.innerText = t.startNew;
            installBtn.innerText = t.install;
            donationLink.innerHTML = t.coffee;
            closeHelp.innerText = t.gotIt;
            helpTitle.innerText = t.helpTitle;
            helpSteps.innerHTML = t.helpSteps.map(step => `<p>${step}</p>`).join('');
            poiTitle.innerText = t.findPlaces;
            closePoiBtn.innerText = t.close;
            closeLangBtn.innerText = t.close;
            langModalTitle.innerText = t.selectLang;
            distLabel.innerText = t.distance;
            completeTitle.innerText = t.tripComplete;
            timeLabel.innerText = t.time;
            minLabel.innerText = t.minutes;

            // Update POI category labels
            const poiLabels = {
                playground: currentLang === 'nl' ? 'Speel' : 'Play',
                cafe: currentLang === 'nl' ? 'Cafe' : 'Cafe',
                snackbar: currentLang === 'nl' ? 'Snack' : 'Snack',
                toilet: currentLang === 'nl' ? 'WC' : 'WC',
                water: currentLang === 'nl' ? 'Water' : 'Water',
                shop: currentLang === 'nl' ? 'Winkel' : 'Shop',
                bench: currentLang === 'nl' ? 'Rust' : 'Rest',
                viewpoint: currentLang === 'nl' ? 'Zicht' : 'View',
                park: currentLang === 'nl' ? 'Park' : 'Park',
                ice_cream: currentLang === 'nl' ? 'Ijs' : 'Ice',
                pharmacy: currentLang === 'nl' ? 'Apotheek' : 'Meds',
                bus_stop: currentLang === 'nl' ? 'Bus' : 'Bus'
            };

            catBtns.forEach(btn => {
                const type = btn.dataset.type;
                const icon = btn.querySelector('.cat-icon').outerHTML;
                btn.innerHTML = `${icon}${poiLabels[type] || btn.dataset.label}`;
            });
            
            // RTL support for Arabic
            document.body.style.direction = currentLang === 'ar' ? 'rtl' : 'ltr';
        }

        function renderLangList() {
            langList.innerHTML = '';
            languages.forEach(lang => {
                const div = document.createElement('div');
                div.className = `lang-item ${currentLang === lang.code ? 'active' : ''}`;
                div.innerText = lang.name;
                div.onclick = () => {
                    setLanguage(lang.code);
                    langOverlay.style.display = 'none';
                };
                langList.appendChild(div);
            });
        }

        openLangBtn.addEventListener('click', () => {
            langOverlay.style.display = 'flex';
        });

        closeLangBtn.addEventListener('click', () => {
            langOverlay.style.display = 'none';
        });

        // Initialize UI
        updateUI();
        renderLangList();

        // PWA Install Prompt
        let deferredPrompt;
        
        // Check if already installed
        if (window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true) {
            installBtn.style.display = 'none';
        }

        window.addEventListener('beforeinstallprompt', (e) => {
            // Only show if not already in standalone mode
            if (window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true) {
                return;
            }
            e.preventDefault();
            deferredPrompt = e;
            installBtn.style.display = 'block';
        });

        installBtn.addEventListener('click', async () => {
            if (!deferredPrompt) return;
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            if (outcome === 'accepted') {
                installBtn.style.display = 'none';
            }
            deferredPrompt = null;
        });

        // Help Overlay Logic
        openHelp.addEventListener('click', () => {
            helpOverlay.style.display = 'flex';
        });

        closeHelp.addEventListener('click', () => {
            helpOverlay.style.display = 'none';
        });

        helpOverlay.addEventListener('click', (e) => {
            if (e.target === helpOverlay) {
                helpOverlay.style.display = 'none';
            }
        });

        // POI Logic
        let currentCategory = 'playground';
        
        const poiQueries = {
            playground: 'node["leisure"="playground"]',
            cafe: 'node["amenity"="cafe"]',
            snackbar: 'node["amenity"="fast_food"]',
            toilet: 'node["amenity"="toilets"]',
            water: 'node["amenity"="drinking_water"]',
            shop: 'node["shop"="supermarket"]',
            bench: 'node["amenity"="bench"]',
            viewpoint: 'node["tourism"="viewpoint"]',
            park: 'node["leisure"="park"]',
            ice_cream: 'node["amenity"="ice_cream"]',
            pharmacy: 'node["amenity"="pharmacy"]',
            bus_stop: 'node["highway"="bus_stop"]'
        };

        openPoiBtn.addEventListener('click', () => {
            poiOverlay.style.display = 'flex';
            fetchPOIs();
        });

        closePoiBtn.addEventListener('click', () => {
            poiOverlay.style.display = 'none';
        });

        catBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                catBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentCategory = btn.dataset.type;
                poiTitle.innerText = `${translations[currentLang].findPlaces}: ${btn.dataset.label}`;
                fetchPOIs();
            });
        });

        async function fetchPOIs() {
            const t = translations[currentLang];
            poiList.innerHTML = `
                <div class="loading-poi">
                    <div class="spinner"></div>
                    ${t.locatingYou}
                </div>`;
            poiStatus.innerText = "Accessing GPS...";
            
            navigator.geolocation.getCurrentPosition(async (position) => {
                const lat = position.coords.latitude;
                const lon = position.coords.longitude;
                
                poiList.innerHTML = `
                    <div class="loading-poi">
                        <div class="spinner"></div>
                        ${t.searchingPoi}
                    </div>`;
                poiStatus.innerText = `Searching within 3km...`;
                
                const queryTag = poiQueries[currentCategory];
                const query = `[out:json];${queryTag}(around:3000,${lat},${lon});out;`;
                const url = `https://overpass-api.de/api/interpreter?data=${encodeURIComponent(query)}`;
                
                try {
                    const response = await fetch(url);
                    const data = await response.json();
                    
                    if (data.elements && data.elements.length > 0) {
                        poiList.innerHTML = '';
                        poiStatus.innerText = `Found ${data.elements.length} locations`;
                        
                        const pois = data.elements.map(item => {
                            const d = getDistance(lat, lon, item.lat, item.lon);
                            return { ...item, distance: d };
                        }).sort((a, b) => a.distance - b.distance);

                        pois.slice(0, 15).forEach(poi => {
                            const div = document.createElement('div');
                            div.className = 'poi-item';
                            const name = poi.tags.name || `Unnamed ${currentCategory}`;
                            div.innerHTML = `
                                <h4>${name}</h4>
                                <p>${Math.round(poi.distance)} meters away</p>
                            `;
                            div.onclick = () => {
                                homeLat = poi.lat;
                                homeLon = poi.lon;
                                setHomeBtn.classList.add('home-set');
                                setHomeBtn.innerText = `${t.homeSetPoi}: ${currentCategory.toUpperCase()}`;
                                poiOverlay.style.display = 'none';
                                customAlert(`${t.targetSet} ${name}`);
                            };
                            poiList.appendChild(div);
                        });
                    } else {
                        poiList.innerHTML = `<div class="loading-poi">${t.noPoiFound}</div>`;
                        poiStatus.innerText = "Try another category";
                    }
                } catch (error) {
                    poiList.innerHTML = `<div class="loading-poi">${t.connError}</div>`;
                    poiStatus.innerText = "Connection error";
                    console.error(error);
                }
            }, (error) => {
                poiList.innerHTML = `<div class="loading-poi">${t.gpsError}</div>`;
                poiStatus.innerText = "GPS error";
            });
        }

        // Custom Alert Logic
        function customAlert(message) {
            const t = translations[currentLang];
            return new Promise((resolve) => {
                confirmMsg.innerText = message;
                confirmNoBtn.style.display = 'none';
                confirmYesBtn.innerText = t.ok;
                confirmOverlay.style.display = 'flex';

                const onOk = () => {
                    cleanup();
                    resolve();
                };

                const cleanup = () => {
                    confirmOverlay.style.display = 'none';
                    confirmNoBtn.style.display = 'block';
                    confirmYesBtn.innerText = t.yes;
                    confirmYesBtn.removeEventListener('click', onOk);
                };

                confirmYesBtn.addEventListener('click', onOk, { once: true });
            });
        }

        // Custom Confirm Logic
        function customConfirm(message) {
            const t = translations[currentLang];
            return new Promise((resolve) => {
                confirmMsg.innerText = message;
                confirmNoBtn.style.display = 'block';
                confirmNoBtn.innerText = t.no;
                confirmYesBtn.innerText = t.yes;
                confirmOverlay.style.display = 'flex';

                const onYes = () => {
                    cleanup();
                    resolve(true);
                };

                const onNo = () => {
                    cleanup();
                    resolve(false);
                };

                const cleanup = () => {
                    confirmOverlay.style.display = 'none';
                    confirmYesBtn.removeEventListener('click', onYes);
                    confirmNoBtn.removeEventListener('click', onNo);
                };

                confirmYesBtn.addEventListener('click', onYes, { once: true });
                confirmNoBtn.addEventListener('click', onNo, { once: true });
            });
        }

        // Utils: Haversine distance
        function getDistance(lat1, lon1, lat2, lon2) {
            const R = 6371000; // Radius of Earth in meters
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                      Math.sin(dLon/2) * Math.sin(dLon/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return R * c;
        }

        // Utils: Bearing calculation
        function getBearing(lat1, lon1, lat2, lon2) {
            const y = Math.sin((lon2 - lon1) * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180);
            const x = Math.cos(lat1 * Math.PI / 180) * Math.sin(lat2 * Math.PI / 180) -
                      Math.sin(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.cos((lon2 - lon1) * Math.PI / 180);
            const bearing = Math.atan2(y, x) * 180 / Math.PI;
            return (bearing + 360) % 360;
        }

        // Set Home Functionality
        setHomeBtn.addEventListener('click', () => {
            const t = translations[currentLang];
            if (!navigator.geolocation) {
                customAlert("Geolocation is not supported by your browser");
                return;
            }

            setHomeBtn.innerText = t.locating;
            
            navigator.geolocation.getCurrentPosition(
                (position) => {
                    homeLat = position.coords.latitude;
                    homeLon = position.coords.longitude;
                    
                    setHomeBtn.classList.add('home-set');
                    setHomeBtn.innerText = t.homeSet;
                    console.log(`Home set at: ${homeLat}, ${homeLon}`);
                },
                (error) => {
                    customAlert(`Error: ${error.message}`);
                    setHomeBtn.innerText = t.setHome;
                },
                { enableHighAccuracy: true }
            );
        });

        // Go Home Functionality
        goHomeBtn.addEventListener('click', () => {
            const t = translations[currentLang];
            if (homeLat === null || homeLon === null) {
                customAlert(t.pressSetHome);
                return;
            }

            showScreen(compassScreen);
            startNavigation();
        });

        function showScreen(screen) {
            [homeScreen, compassScreen, completeScreen].forEach(s => s.classList.remove('active'));
            screen.classList.add('active');
        }

        function startNavigation() {
            startTime = new Date();
            arrivalTriggered = false;
            
            // Start GPS tracking
            watchId = navigator.geolocation.watchPosition(
                (position) => {
                    currentLat = position.coords.latitude;
                    currentLon = position.coords.longitude;
                    currentSpeed = position.coords.speed; // m/s
                    updateNavigation();
                },
                (error) => console.error(error),
                { enableHighAccuracy: true }
            );

            // Start Device Orientation
            if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                // iOS 13+
                DeviceOrientationEvent.requestPermission()
                    .then(response => {
                        if (response == 'granted') {
                            window.addEventListener('deviceorientation', handleOrientation);
                        }
                    })
                    .catch(console.error);
            } else {
                window.addEventListener('deviceorientation', handleOrientation);
            }
        }

        function handleOrientation(event) {
            // For Android (event.alpha)
            if (event.webkitCompassHeading) {
                heading = event.webkitCompassHeading; // iOS
            } else if (event.alpha !== null) {
                heading = 360 - event.alpha; // Android/Generic
            }
            updateNavigation();
        }

        function updateNavigation() {
            if (currentLat === null || homeLat === null) return;

            const t = translations[currentLang];
            const distance = getDistance(currentLat, currentLon, homeLat, homeLon);
            const bearing = getBearing(currentLat, currentLon, homeLat, homeLon);
            
            // Calculate arrow direction
            // direction = bearing - heading
            let direction = (bearing - heading + 360) % 360;
            
            // Update UI
            arrow.style.transform = `rotate(${direction}deg)`;
            distanceVal.innerText = Math.round(distance);

            // Update ETA based on current speed
            if (currentSpeed && currentSpeed > 0.2) {
                const speedKmh = currentSpeed * 3.6;
                const timeMinutes = Math.round((distance / currentSpeed) / 60);
                etaDisplay.innerText = `${t.timeToHome}: ${timeMinutes} min (${speedKmh.toFixed(1)} km/h)`;
            } else {
                etaDisplay.innerText = `${t.timeToHome}: -- min (${t.standingStill})`;
            }

            // Direction Feedback: Correct Direction
            // If |direction| < 20° (or > 340°)
            const diff = Math.abs(direction > 180 ? direction - 360 : direction);
            if (diff < 20) {
                arrow.classList.add('green');
            } else {
                arrow.classList.remove('green');
            }

            // Near Destination: Blink if < 50m
            if (distance < 50) {
                arrow.classList.add('blink');
            } else {
                arrow.classList.remove('blink');
            }

            // Arrival Detection: < 20m
            if (distance < 20 && !arrivalTriggered) {
                onArrival();
            }
        }

        function onArrival() {
            arrivalTriggered = true;
            
            // Stop tracking
            stopNavigation();

            // Confetti
            confetti({
                particleCount: 150,
                spread: 70,
                origin: { y: 0.6 }
            });

            // Vibration
            if (navigator.vibrate) {
                navigator.vibrate([200, 100, 200, 100, 200]);
            }

            // Sound (using simple Beep)
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            oscillator.type = 'sine';
            oscillator.frequency.setValueAtTime(880, audioCtx.currentTime); // A5
            gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
            gainNode.gain.linearRampToValueAtTime(0.5, audioCtx.currentTime + 0.1);
            gainNode.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.5);
            oscillator.start();
            oscillator.stop(audioCtx.currentTime + 0.5);

            // Calculate duration
            const endTime = new Date();
            const durationMinutes = Math.round((endTime - startTime) / 60000);
            tripTimeDisplay.innerText = durationMinutes;

            // Show Trip Complete screen after delay
            setTimeout(() => {
                showScreen(completeScreen);
            }, 3000);
        }

        function stopNavigation() {
            if (watchId !== null) {
                navigator.geolocation.clearWatch(watchId);
                watchId = null;
            }
            window.removeEventListener('deviceorientation', handleOrientation);
        }

        // Stop Button
        stopBtn.addEventListener('click', async () => {
            const t = translations[currentLang];
            const firstConfirm = await customConfirm(t.confirmStop1);
            if (firstConfirm) {
                const secondConfirm = await customConfirm(t.confirmStop2);
                if (secondConfirm) {
                    stopNavigation();
                    resetAppState();
                    showScreen(homeScreen);
                }
            }
        });

        // Start New Trip
        startNewBtn.addEventListener('click', () => {
            stopNavigation();
            resetAppState();
            showScreen(homeScreen);
        });

        function resetCompassUI() {
            distanceVal.innerText = "0";
            arrow.style.transform = "rotate(0deg)";
            arrow.classList.remove('green', 'blink');
        }

        function resetAppState() {
            const t = translations[currentLang];
            homeLat = null;
            homeLon = null;
            arrivalTriggered = false;
            resetCompassUI();
            
            setHomeBtn.classList.remove('home-set');
            setHomeBtn.innerText = t.setHome;
        }

        // Register Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('SW registered'))
                    .catch(err => console.error('SW registration failed', err));
            });
        }
    </script>
