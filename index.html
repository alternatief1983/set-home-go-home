<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Set Home – Go Home</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    
    <!-- iOS support -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Set Home Go Home">
    <link rel="apple-touch-icon" href="icon-192.png">
    
    <!-- Leaflet Map Library -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        :root {
            --red: #ff4d4d;
            --green: #4caf50;
            --blue: #2196f3;
            --white: #ffffff;
            --black: #000000;
            --gray: #f0f0f0;
            --gold: #ffd700;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        a, button {
            user-select: auto;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--black);
            color: var(--white);
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .screen {
            display: none;
            width: 100%;
            height: 100%;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            text-align: center;
        }

        .screen.active {
            display: flex;
        }

        /* Pro Badge */
        .pro-badge {
            background: var(--gold);
            color: black;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: bold;
            margin-left: 5px;
            vertical-align: middle;
        }

        /* Ad Overlay */
        #ad-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--black);
            z-index: 1000;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .ad-content {
            width: 100%;
            height: 80%;
            background: #222;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: #555;
            border: 2px dashed #444;
            margin-bottom: 20px;
        }

        .close-ad-btn {
            background: var(--white);
            color: var(--black);
            border: none;
            padding: 15px 40px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 1.2rem;
        }

        /* Pro Modal */
        #pro-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 500;
            padding: 30px;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .pro-content {
            background: #1a1a1a;
            padding: 30px;
            border-radius: 25px;
            border: 2px solid var(--gold);
            max-width: 90%;
            text-align: center;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.3);
        }

        .pro-content h2 { color: var(--gold); margin-bottom: 20px; }
        .pro-features { text-align: left; margin: 20px 0; }
        .pro-features li { margin-bottom: 10px; list-style: none; display: flex; align-items: center; gap: 10px; }

        .buy-pro-btn {
            background: linear-gradient(45deg, #ffd700, #ff8c00);
            color: black;
            border: none;
            padding: 15px 30px;
            border-radius: 15px;
            font-weight: bold;
            font-size: 1.2rem;
            width: 100%;
            margin-top: 10px;
            cursor: pointer;
        }

        /* Home Screen */
        #install-btn {
            display: none;
            position: absolute;
            bottom: 30px;
            background: var(--blue);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: bold;
            z-index: 10;
        }

        .help-btn, .lang-btn, .poi-btn {
            position: absolute;
            bottom: 20px;
            background: rgba(0, 0, 0, 0.5);
            color: var(--white);
            border: 2px solid var(--green);
            width: 45px;
            height: 45px;
            border-radius: 50%;
            font-size: 1.3rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 10;
            box-shadow: 0 0 15px rgba(76, 175, 80, 0.5);
            transition: all 0.2s ease;
        }

        .help-btn { right: 20px; }
        .lang-btn { right: 80px; }
        .poi-btn { left: 20px; animation: pulse-green-border 2s infinite; }

        @keyframes pulse-green-border {
            0% { box-shadow: 0 0 10px rgba(76, 175, 80, 0.4); border-color: rgba(76, 175, 80, 0.6); }
            50% { box-shadow: 0 0 20px rgba(76, 175, 80, 0.8); border-color: rgba(76, 175, 80, 1); }
            100% { box-shadow: 0 0 10px rgba(76, 175, 80, 0.4); border-color: rgba(76, 175, 80, 0.6); }
        }

        .btn-container {
            display: flex;
            flex-direction: column;
            gap: 5vh;
            margin-top: 10vh;
            width: 90%;
            align-items: center;
        }

        .circle-btn {
            width: 38vh;
            height: 38vh;
            max-width: 75vw;
            max-height: 75vw;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.2);
            color: var(--white);
            font-size: 2.5rem;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            aspect-ratio: 1/1;
            position: relative;
            overflow: hidden;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }

        #set-home-btn {
            background: radial-gradient(circle at 30% 30%, #1a1a1a, #000);
            box-shadow: 0 0 25px rgba(255, 77, 77, 0.5), border: 2px solid var(--red);
            animation: pulse-red-border 2s infinite;
        }

        #go-home-btn {
            background: radial-gradient(circle at 30% 30%, #1a1a1a, #000);
            width: 28vh; height: 28vh;
            font-size: 1.8rem;
            border: 2px solid var(--green);
        }

        /* Compass Screen */
        .compass-container {
            position: relative;
            width: 45vh; height: 45vh;
            border-radius: 50%;
            border: 3px solid var(--green);
            background: radial-gradient(circle at 50% 50%, #1a1a1a, #000);
            box-shadow: 0 0 35px rgba(76, 175, 80, 0.6);
            margin-bottom: 5vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .arrow {
            width: 0; height: 0;
            border-left: 4vh solid transparent;
            border-right: 4vh solid transparent;
            border-bottom: 12vh solid var(--white);
            transition: transform 0.2s;
        }
        .arrow.green { border-bottom-color: var(--green); }

        /* Map Screen */
        #map { width: 100%; height: 60vh; border-bottom: 2px solid rgba(255, 255, 255, 0.2); margin-bottom: 2vh; }
        .offline-btn {
            background: rgba(255, 255, 255, 0.1);
            color: white; border: 1px solid var(--green);
            padding: 1vh 3vh; border-radius: 12px;
            margin-bottom: 1vh; width: 80%;
        }

        .locked-feature::after {
            content: ' 🔒';
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
    <!-- Full Screen Ad Overlay -->
    <div id="ad-overlay">
        <div class="ad-content">ADVERTISEMENT</div>
        <button id="close-ad-btn" class="close-ad-btn">Close Ad</button>
    </div>

    <!-- Pro Offer Overlay -->
    <div id="pro-offer-overlay" id="pro-overlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:2000; flex-direction:column; align-items:center; justify-content:center; padding:30px;">
        <div class="pro-content">
            <h2>Unlock PRO Navigation</h2>
            <ul class="pro-features">
                <li>🗺️ Full Map View</li>
                <li>📍 Unlimited Waypoints</li>
                <li>📥 Offline Maps</li>
                <li>🔋 Power Saving Mode</li>
                <li>🚫 No Advertisements</li>
            </ul>
            <button id="buy-pro-action" class="buy-pro-btn">Upgrade to PRO</button>
            <button id="close-pro-offer" style="background:transparent; color:white; border:none; margin-top:20px; text-decoration:underline;">Maybe Later</button>
        </div>
    </div>

    <!-- Home Screen -->
    <div id="home-screen" class="screen active">
        <div class="btn-container">
            <button id="go-home-btn" class="circle-btn">Go Home</button>
            <button id="set-home-btn" class="circle-btn">Set Home</button>
        </div>
        <button id="install-btn">📱 Install App</button>
        <div id="open-poi" class="poi-btn">📍</div>
        <div id="open-lang" class="lang-btn">🌐</div>
        <div id="open-help" class="help-btn">?</div>
    </div>

    <!-- Navigation Selection -->
    <div id="selection-screen" class="screen">
        <h2 id="choose-nav-title" style="color:var(--green); margin-bottom:4vh; font-size:2rem;">Choose Navigation</h2>
        <div class="btn-container" style="margin-top:0;">
            <button id="select-compass-btn" class="circle-btn" style="width:25vh; height:25vh; font-size:1.5rem;">🧭 Compass</button>
            <button id="select-map-btn" class="circle-btn" style="width:25vh; height:25vh; font-size:1.5rem;">🗺️ Map <span class="pro-badge">PRO</span></button>
        </div>
        <button id="cancel-selection-btn" style="margin-top:5vh; background:none; color:white; border:none; font-size:1.2rem;">Cancel</button>
    </div>

    <!-- Compass Screen -->
    <div id="compass-screen" class="screen">
        <div class="compass-container">
            <div id="arrow" class="arrow"></div>
        </div>
        <div class="distance-display">
            <span id="distance-val">0</span> m
        </div>
        <button id="stop-btn" style="background:var(--red); padding:15px 50px; border-radius:15px; border:none; color:white; font-weight:bold; font-size:1.5rem;">STOP</button>
    </div>

    <!-- Map Screen -->
    <div id="map-screen" class="screen">
        <div id="map"></div>
        <button id="map-poi-btn" class="offline-btn">📍 Intermediate Stop</button>
        <button id="powersave-btn" class="offline-btn">🔋 PowerSave</button>
        <button id="offline-map-btn" class="offline-btn">📥 Offline Map</button>
        <button id="sos-btn" style="background:var(--red); color:white; border:none; padding:10px 20px; border-radius:10px; margin-bottom:10px;">🆘 SOS</button>
        <button id="map-stop-btn" style="background:var(--red); padding:10px 30px; border-radius:10px; border:none; color:white;">STOP</button>
    </div>

    <!-- Modals (Help, POI, Lang, etc.) -->
    <div id="help-overlay" class="screen" style="position:fixed; background:rgba(0,0,0,0.9); z-index:100;">
        <div class="pro-content" style="border-color:var(--green); text-align:left;">
            <h2 id="help-title">How it works</h2>
            <div id="help-steps"></div>
            <button id="close-help" class="buy-pro-btn" style="background:var(--green);">Got it!</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script>
        // State
        let isPro = localStorage.getItem('isPro') === 'true';
        let adTimer = null;
        let lastAdTime = Date.now();

        // Navigation State
        let homeLat = null, homeLon = null, currentLat = null, currentLon = null;
        let watchId = null, heading = 0;

        // UI Elements
        const screens = ['home-screen', 'selection-screen', 'compass-screen', 'map-screen'];
        function showScreen(id) {
            screens.forEach(s => document.getElementById(s).style.display = (s === id ? 'flex' : 'none'));
        }

        // Ad Logic
        function startAdTimer() {
            if (isPro) return;
            adTimer = setInterval(() => {
                const now = Date.now();
                if (now - lastAdTime >= 120000) { // 120 seconds
                    showAd();
                }
            }, 10000);
        }

        function showAd() {
            if (isPro) return;
            document.getElementById('ad-overlay').style.display = 'flex';
            lastAdTime = Date.now();
            console.log("Showing Interstitial Ad");
        }

        document.getElementById('close-ad-btn').onclick = () => {
            document.getElementById('ad-overlay').style.display = 'none';
        };

        // Pro Logic
        function checkProFeature(e) {
            if (!isPro) {
                e.stopImmediatePropagation();
                document.getElementById('pro-offer-overlay').style.display = 'flex';
                return false;
            }
            return true;
        }

        document.getElementById('buy-pro-action').onclick = () => {
            // Here you would normally link to Google Play Billing
            alert("Redirecting to Secure Payment...");
            isPro = true;
            localStorage.setItem('isPro', 'true');
            document.getElementById('pro-offer-overlay').style.display = 'none';
            location.reload(); // Refresh to unlock everything
        };

        document.getElementById('close-pro-offer').onclick = () => {
            document.getElementById('pro-offer-overlay').style.display = 'none';
        };

        // Navigation Actions
        document.getElementById('set-home-btn').onclick = () => {
            navigator.geolocation.getCurrentPosition(p => {
                homeLat = p.coords.latitude;
                homeLon = p.coords.longitude;
                document.getElementById('set-home-btn').style.borderColor = 'var(--green)';
                document.getElementById('set-home-btn').innerText = "Home Set!";
            });
        };

        document.getElementById('go-home-btn').onclick = () => {
            if (!homeLat) return alert("Set Home first!");
            showScreen('selection-screen');
        };

        document.getElementById('select-compass-btn').onclick = () => {
            showScreen('compass-screen');
            startTracking();
        };

        document.getElementById('select-map-btn').onclick = (e) => {
            if (checkProFeature(e)) {
                showScreen('map-screen');
                startTracking();
                initMap();
            }
        };

        document.getElementById('cancel-selection-btn').onclick = () => showScreen('home-screen');

        // GPS Tracking
        function startTracking() {
            watchId = navigator.geolocation.watchPosition(p => {
                currentLat = p.coords.latitude;
                currentLon = p.coords.longitude;
                updateNav();
            }, null, {enableHighAccuracy: true});
            
            window.addEventListener('deviceorientation', e => {
                heading = e.webkitCompassHeading || (360 - e.alpha);
                updateNav();
            });
        }

        function updateNav() {
            if (!currentLat || !homeLat) return;
            const dist = getDist(currentLat, currentLon, homeLat, homeLon);
            document.getElementById('distance-val').innerText = Math.round(dist);
            
            const bearing = getBearing(currentLat, currentLon, homeLat, homeLon);
            const dir = (bearing - heading + 360) % 360;
            document.getElementById('arrow').style.transform = `rotate(${dir}deg)`;
            
            if (dist < 10) {
                confetti();
                stopNav();
            }
        }

        function getDist(lat1, lon1, lat2, lon2) {
            const R = 6371e3;
            const φ1 = lat1 * Math.PI/180, φ2 = lat2 * Math.PI/180;
            const Δφ = (lat2-lat1) * Math.PI/180, Δλ = (lon2-lon1) * Math.PI/180;
            const a = Math.sin(Δφ/2)**2 + Math.cos(φ1)*Math.cos(φ2)*Math.sin(Δλ/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        function getBearing(lat1, lon1, lat2, lon2) {
            const y = Math.sin((lon2-lon1)*Math.PI/180) * Math.cos(lat2*Math.PI/180);
            const x = Math.cos(lat1*Math.PI/180)*Math.sin(lat2*Math.PI/180) - Math.sin(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.cos((lon2-lon1)*Math.PI/180);
            return (Math.atan2(y, x)*180/Math.PI + 360) % 360;
        }

        function stopNav() {
            navigator.geolocation.clearWatch(watchId);
            showScreen('home-screen');
        }

        document.getElementById('stop-btn').onclick = stopNav;
        document.getElementById('map-stop-btn').onclick = stopNav;

        // Init
        startAdTimer();
    </script>
</body>
</html>
